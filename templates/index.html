<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北美美妝熱銷排行 - Beauty Scraping</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 50%, #e8eaf6 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        header {
            text-align: center;
            padding: 40px 20px;
            background: rgba(255,255,255,0.7);
            border-radius: 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }
        header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #e91e63, #9c27b0, #673ab7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        header p {
            color: #666;
            font-size: 1.1rem;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        .btn-primary {
            background: linear-gradient(135deg, #e91e63, #9c27b0);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(233, 30, 99, 0.4);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .btn-filter {
            background: white;
            color: #e91e63;
            border: 2px solid #e91e63;
        }
        .btn-filter.active {
            background: #e91e63;
            color: white;
        }
        .btn-filter:hover {
            transform: translateY(-2px);
        }
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: white;
            padding: 20px 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: #e91e63;
        }
        .stat-label {
            color: #666;
            font-size: 0.9rem;
            margin-top: 5px;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 60px;
        }
        .loading.active { display: block; }
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #e91e63;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }
        .product-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }
        .product-image {
            height: 200px;
            background: linear-gradient(135deg, #fce4ec, #f3e5f5);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .product-image img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .product-image .placeholder {
            font-size: 4rem;
        }
        .product-info {
            padding: 20px;
        }
        .product-source {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .source-sephora { background: #000; color: #fff; }
        .source-ulta { background: #e91e63; color: #fff; }
        .product-brand {
            font-size: 0.85rem;
            color: #999;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .product-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            line-height: 1.4;
        }
        .product-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }
        .product-price {
            font-size: 1.3rem;
            font-weight: 700;
            color: #e91e63;
        }
        .product-rating {
            color: #ffc107;
            font-size: 0.9rem;
        }
        .product-link {
            display: block;
            margin-top: 15px;
            padding: 10px;
            text-align: center;
            background: linear-gradient(135deg, #fce4ec, #f3e5f5);
            border-radius: 10px;
            color: #e91e63;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .product-link:hover {
            background: linear-gradient(135deg, #e91e63, #9c27b0);
            color: white;
        }
        .error {
            display: none;
            text-align: center;
            padding: 40px;
            background: #fff3f3;
            border-radius: 15px;
            color: #d32f2f;
        }
        .error.active { display: block; }
        .empty {
            display: none;
            text-align: center;
            padding: 60px;
            color: #666;
        }
        .empty.active { display: block; }
        @media (max-width: 768px) {
            header h1 { font-size: 1.8rem; }
            .products-grid { grid-template-columns: 1fr; }
            .stats { gap: 15px; }
            .stat-card { padding: 15px 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>北美美妝熱銷排行</h1>
            <p>即時爬取 Sephora / Ulta 最暢銷美妝產品</p>
        </header>

        <div class="controls">
            <button class="btn btn-primary" id="scrapeBtn" onclick="fetchProducts()">
                開始爬取
            </button>
            <button class="btn btn-filter active" data-filter="all" onclick="filterBySource('all', this)">全部</button>
            <button class="btn btn-filter" data-filter="Sephora" onclick="filterBySource('Sephora', this)">Sephora</button>
            <button class="btn btn-filter" data-filter="Ulta" onclick="filterBySource('Ulta', this)">Ulta</button>
        </div>

        <div class="stats" id="stats" style="display:none;">
            <div class="stat-card">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">總產品數</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="sephoraCount">0</div>
                <div class="stat-label">Sephora</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="ultaCount">0</div>
                <div class="stat-label">Ulta</div>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>正在爬取資料中，請稍候...</p>
        </div>

        <div class="error" id="error">
            <p>爬取失敗，請稍後再試。</p>
        </div>

        <div class="empty" id="empty">
            <p>尚無資料，請點擊「開始爬取」</p>
        </div>

        <div class="products-grid" id="products"></div>
    </div>

    <script>
        let allProducts = [];
        let currentFilter = 'all';

        async function fetchProducts() {
            const btn = document.getElementById('scrapeBtn');
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const productsDiv = document.getElementById('products');
            const statsDiv = document.getElementById('stats');

            btn.disabled = true;
            btn.textContent = '爬取中...';
            loading.classList.add('active');
            error.classList.remove('active');
            productsDiv.innerHTML = '';
            statsDiv.style.display = 'none';

            try {
                const resp = await fetch('/api/scrape');
                if (!resp.ok) throw new Error('Network error');
                allProducts = await resp.json();
                loading.classList.remove('active');

                if (allProducts.length === 0) {
                    document.getElementById('empty').classList.add('active');
                } else {
                    document.getElementById('empty').classList.remove('active');
                    updateStats();
                    renderProducts(allProducts);
                    statsDiv.style.display = 'flex';
                }
            } catch (e) {
                loading.classList.remove('active');
                error.classList.add('active');
            } finally {
                btn.disabled = false;
                btn.textContent = '開始爬取';
            }
        }

        function updateStats() {
            document.getElementById('totalCount').textContent = allProducts.length;
            document.getElementById('sephoraCount').textContent = allProducts.filter(p => p.source.includes('Sephora')).length;
            document.getElementById('ultaCount').textContent = allProducts.filter(p => p.source.includes('Ulta')).length;
        }

        function filterBySource(source, el) {
            currentFilter = source;
            document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            const filtered = source === 'all' ? allProducts : allProducts.filter(p => p.source.includes(source));
            renderProducts(filtered);
        }

        function renderProducts(products) {
            const container = document.getElementById('products');
            container.innerHTML = '';
            products.forEach(p => {
                const sourceClass = p.source.includes('Sephora') ? 'source-sephora' : 'source-ulta';
                const imageHtml = p.image
                    ? `<img src="${p.image}" alt="${p.name}" loading="lazy">`
                    : `<span class="placeholder">💄</span>`;
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="product-image">${imageHtml}</div>
                    <div class="product-info">
                        <span class="product-source ${sourceClass}">${p.source}</span>
                        <div class="product-brand">${p.brand}</div>
                        <div class="product-name">${p.name}</div>
                        <div class="product-meta">
                            <span class="product-price">${p.price}</span>
                            <span class="product-rating">${p.rating ? '★ ' + p.rating : ''}</span>
                        </div>
                        <a href="${p.url}" target="_blank" class="product-link">查看商品</a>
                    </div>`;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
